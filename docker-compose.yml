networks:
  default:

services:
  # --- DATABASE ---
  database:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mairie360-db
    networks:
      - default
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- LIQUIBASE ---
  liquibase:
    build:
      context: ./liquibase
      dockerfile: Dockerfile
    container_name: mairie360-liquibase
    networks:
      - default
    depends_on:
      database:
        condition: service_healthy
    environment:
      # 1. Utiliser le nom du container_name défini plus haut
      - LIQUIBASE_COMMAND_URL=jdbc:postgresql://mairie360-db:5432/core
      - LIQUIBASE_COMMAND_USERNAME=postgres
      - LIQUIBASE_COMMAND_PASSWORD=password
      # 2. Pointer vers le répertoire où vous avez réellement copié les fichiers
      - LIQUIBASE_SEARCH_PATH=/workspace
    command: >
      --changelog-file=changelog.xml
      update